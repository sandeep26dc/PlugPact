<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0" />
    </radialGradient>
  </defs>
  
  <!-- Outer Glowing Circle -->
  <circle cx="150" cy="150" r="120" fill="url(#glow)">
    <animate attributeName="r" values="110;130;110" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite" />
  </circle>

  <!-- Circular Border -->
  <circle cx="150" cy="150" r="100" fill="none" stroke="#00F0FF" stroke-width="4" stroke-dasharray="10,10">
    <animateTransform attributeName="transform" type="rotate" from="0 150 150" to="360 150 150" dur="10s" repeatCount="indefinite" />
  </circle>

  <!-- Central Battery Icon -->
  <rect x="130" y="110" width="40" height="80" rx="5" fill="none" stroke="#00F0FF" stroke-width="6" />
  <rect x="142" y="100" width="16" height="10" rx="2" fill="#00F0FF" />
  
  <!-- Internal Liquid Fill -->
  <rect x="135" y="130" width="30" height="55" fill="#00F0FF">
    <animate attributeName="height" values="0;55;0" dur="4s" repeatCount="indefinite" />
    <animate attributeName="y" values="185;130;185" dur="4s" repeatCount="indefinite" />
  </rect>

  <!-- Spark Electric Arcs -->
  <path d="M150 50 L160 80 L140 80 L150 110" fill="none" stroke="#00F0FF" stroke-width="3">
    <animate attributeName="opacity" values="0;1;0" dur="0.5s" repeatCount="indefinite" />
  </path>
</svg>
